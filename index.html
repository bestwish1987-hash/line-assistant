<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小助 · 私人助理</title>
  <!-- LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <!-- Babel -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #e8f5e9; font-family: 'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
    @keyframes dotBounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    @keyframes popIn { from{opacity:0;transform:scale(0.92) translateY(6px)} to{opacity:1;transform:scale(1) translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    .splash { position:fixed;inset:0;background:linear-gradient(135deg,#06c755,#04a844);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;animation:fadeIn 0.3s ease;z-index:999; }
    .splash-icon { font-size:64px; animation: popIn 0.5s ease; }
    .splash-title { color:white;font-size:22px;font-weight:800;letter-spacing:1px; }
    .splash-sub { color:rgba(255,255,255,0.75);font-size:14px; }
    .spinner { width:32px;height:32px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-top:8px; }
    @keyframes spin { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ── 替換成你的 LIFF ID ──────────────────────────────────────────
    const LIFF_ID = "YOUR_LIFF_ID_HERE";
    // ────────────────────────────────────────────────────────────────

    const GREEN = "#06c755", GREEN_DARK = "#04a844";
    const SYSTEM_PROMPT = `你是「小助」，溫暖聰明的繁體中文私人助理，像好友一樣親切。
你可以聊天、規劃行程、記備忘、設提醒、回答問題。
回覆簡潔有力，適當用 emoji，不要廢話。`;

    const nowStr = () => new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"});
    const todayStr = () => new Date().toLocaleDateString("zh-TW",{year:"numeric",month:"long",day:"numeric",weekday:"short"});

    const useStorage = (key, init) => {
      const [v, setV] = React.useState(() => { try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;} });
      const save = val => { setV(val); try{localStorage.setItem(key,JSON.stringify(val));}catch{} };
      return [v, save];
    };

    // ── Avatar ──
    const Avatar = ({src, size=38}) => (
      <div style={{width:size,height:size,borderRadius:"50%",background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.48,flexShrink:0,boxShadow:`0 2px 8px rgba(6,199,85,0.3)`,overflow:"hidden"}}>
        {src ? <img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : "🤖"}
      </div>
    );

    // ── Typing ──
    const Typing = () => (
      <div style={{display:"flex",alignItems:"flex-end",gap:8,marginBottom:12}}>
        <Avatar/>
        <div style={{background:"white",borderRadius:"18px 18px 18px 4px",padding:"12px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)",display:"flex",gap:5}}>
          {[0,1,2].map(i=><span key={i} style={{width:7,height:7,borderRadius:"50%",background:"#bbb",display:"block",animation:"dotBounce 1.2s infinite",animationDelay:`${i*0.2}s`}}/>)}
        </div>
      </div>
    );

    // ── Bubble ──
    const Bubble = ({msg}) => {
      const me = msg.role==="user";
      return (
        <div style={{display:"flex",flexDirection:me?"row-reverse":"row",alignItems:"flex-end",gap:8,marginBottom:10,animation:"popIn 0.22s ease"}}>
          {!me && <Avatar/>}
          <div style={{maxWidth:"72%",display:"flex",flexDirection:"column",alignItems:me?"flex-end":"flex-start",gap:2}}>
            <div style={{background:me?`linear-gradient(135deg,${GREEN},${GREEN_DARK})`:"white",color:me?"white":"#1c1c1c",borderRadius:me?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"10px 14px",fontSize:14.5,lineHeight:1.65,boxShadow:me?`0 3px 10px rgba(6,199,85,0.28)`:"0 1px 5px rgba(0,0,0,0.08)",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>
              {msg.content}
            </div>
            <span style={{fontSize:10.5,color:"#bbb",padding:"0 4px"}}>{msg.time}</span>
          </div>
        </div>
      );
    };

    // ── Chat Tab ──
    const ChatTab = ({userName, userAvatar}) => {
      const greeting = userName ? `嗨 ${userName}！` : "嗨！";
      const [msgs, setMsgs] = React.useState([
        {role:"assistant",content:`${greeting} 我是你的私人助理小助 👋\n有什麼我可以幫你的嗎？`,time:nowStr()}
      ]);
      const [input, setInput] = React.useState("");
      const [loading, setLoading] = React.useState(false);
      const histRef = React.useRef([]);
      const bottomRef = React.useRef(null);
      React.useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs,loading]);

      const send = async (txt) => {
        const text=(txt||input).trim(); if(!text||loading)return;
        setInput("");
        setMsgs(p=>[...p,{role:"user",content:text,time:nowStr()}]);
        setLoading(true);
        histRef.current=[...histRef.current,{role:"user",content:text}];
        try {
          "https://falling-fog-a517.bestwish1987.workers.dev"
            method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:SYSTEM_PROMPT,messages:histRef.current})
          });
          const data=await res.json();
          const reply=data.content?.map(b=>b.text||"").join("")||"抱歉，我暫時無法回應 😅";
          histRef.current=[...histRef.current,{role:"assistant",content:reply}];
          setMsgs(p=>[...p,{role:"assistant",content:reply,time:nowStr()}]);
        } catch { setMsgs(p=>[...p,{role:"assistant",content:"網路出了點問題 😓",time:nowStr()}]); }
        finally { setLoading(false); }
      };

      const chips=["📅 規劃今天行程","✍️ 幫我寫訊息","💡 給我靈感","🗓️ 本週計畫"];
      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#efefef"}}>
          <div style={{textAlign:"center",padding:"10px 0 4px"}}>
            <span style={{background:"rgba(0,0,0,0.11)",color:"#666",fontSize:11,borderRadius:10,padding:"3px 11px"}}>{todayStr()}</span>
          </div>
          <div style={{flex:1,overflowY:"auto",padding:"8px 14px"}}>
            {msgs.map((m,i)=><Bubble key={i} msg={m}/>)}
            {loading&&<Typing/>}
            <div ref={bottomRef}/>
          </div>
          {msgs.length<=1&&(
            <div style={{display:"flex",gap:7,padding:"6px 14px",overflowX:"auto",scrollbarWidth:"none"}}>
              {chips.map(c=>(
                <button key={c} onClick={()=>send(c)} style={{background:"white",border:`1.5px solid ${GREEN}`,color:GREEN,borderRadius:18,padding:"5px 13px",fontSize:12.5,whiteSpace:"nowrap",cursor:"pointer",fontFamily:"inherit",flexShrink:0}}>
                  {c}
                </button>
              ))}
            </div>
          )}
          <div style={{background:"white",padding:"9px 11px",display:"flex",alignItems:"flex-end",gap:9,borderTop:"1px solid #e4e4e4"}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}}}
              placeholder="輸入訊息…" rows={1}
              style={{flex:1,border:"1.5px solid #ddd",borderRadius:22,padding:"9px 15px",fontSize:14.5,resize:"none",fontFamily:"inherit",lineHeight:1.5,maxHeight:90,overflowY:"auto",background:"#fafafa",color:"#1c1c1c",outline:"none"}}
            />
            <button onClick={()=>send()} disabled={!input.trim()||loading} style={{width:42,height:42,borderRadius:"50%",border:"none",background:input.trim()&&!loading?`linear-gradient(135deg,${GREEN},${GREEN_DARK})`:"#ddd",color:"white",fontSize:20,cursor:input.trim()&&!loading?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontFamily:"inherit",transition:"all 0.2s"}}>↑</button>
          </div>
        </div>
      );
    };

    // ── Schedule Tab ──
    const ScheduleTab = () => {
      const [events, setEvents] = useStorage("sched_events",[
        {id:1,date:new Date().toISOString().slice(0,10),time:"09:00",title:"早晨例會",color:GREEN},
      ]);
      const [form, setForm] = React.useState({date:new Date().toISOString().slice(0,10),time:"",title:""});
      const [show, setShow] = React.useState(false);
      const [color, setColor] = React.useState(GREEN);
      const colors=[GREEN,"#ff6b6b","#4dabf7","#ffa94d","#cc5de8","#20c997"];
      const add=()=>{
        if(!form.title.trim())return;
        setEvents([...events,{...form,id:Date.now(),color}].sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time)));
        setForm({date:new Date().toISOString().slice(0,10),time:"",title:""});setShow(false);
      };
      const todayISO=new Date().toISOString().slice(0,10);
      const todayEvts=events.filter(e=>e.date===todayISO);
      const upcoming=events.filter(e=>e.date>todayISO).slice(0,5);
      return (
        <div style={{flex:1,overflowY:"auto",padding:16,background:"#f8f9fa"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontWeight:700,fontSize:17,color:"#1c1c1c"}}>📅 我的行程</span>
            <button onClick={()=>setShow(!show)} style={{background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,color:"white",border:"none",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ 新增</button>
          </div>
          {show&&(
            <div style={{background:"white",borderRadius:16,padding:16,marginBottom:16,boxShadow:"0 4px 16px rgba(0,0,0,0.1)"}}>
              {[["date","date","📅 日期"],["time","time","⏰ 時間"],["text","title","📝 標題"]].map(([type,field,label])=>(
                <input key={field} type={type} placeholder={label} value={form[field]} onChange={e=>setForm({...form,[field]:e.target.value})}
                  style={{width:"100%",border:"1.5px solid #eee",borderRadius:10,padding:"9px 12px",fontSize:14,marginBottom:8,fontFamily:"inherit",outline:"none"}}/>
              ))}
              <div style={{display:"flex",gap:7,marginBottom:12}}>
                {colors.map(c=><div key={c} onClick={()=>setColor(c)} style={{width:22,height:22,borderRadius:"50%",background:c,cursor:"pointer",border:color===c?"2.5px solid #333":"2px solid transparent"}}/>)}
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={add} style={{flex:1,background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,color:"white",border:"none",borderRadius:10,padding:10,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>確認</button>
                <button onClick={()=>setShow(false)} style={{flex:1,background:"#f0f0f0",color:"#555",border:"none",borderRadius:10,padding:10,fontSize:14,cursor:"pointer",fontFamily:"inherit"}}>取消</button>
              </div>
            </div>
          )}
          {[["今天",todayEvts],["即將到來",upcoming]].map(([label,evts])=>(
            <div key={label} style={{marginBottom:18}}>
              <div style={{fontSize:11,fontWeight:700,color:"#999",letterSpacing:1,marginBottom:8}}>{label}</div>
              {evts.length===0?<div style={{color:"#bbb",fontSize:13,textAlign:"center",padding:"12px 0"}}>尚無行程 ✨</div>
              :evts.map(ev=>(
                <div key={ev.id} style={{background:"white",borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)",borderLeft:`4px solid ${ev.color}`}}>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600,fontSize:14.5,color:"#1c1c1c"}}>{ev.title}</div>
                    <div style={{fontSize:12,color:"#aaa",marginTop:2}}>{ev.date} {ev.time&&`· ${ev.time}`}</div>
                  </div>
                  <button onClick={()=>setEvents(events.filter(e=>e.id!==ev.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:18}}>✕</button>
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    };

    // ── Notes Tab ──
    const NotesTab = () => {
      const [notes, setNotes] = useStorage("line_notes",[
        {id:1,title:"購物清單",body:"牛奶、雞蛋、麵包",time:nowStr(),color:"#fff9c4"},
      ]);
      const [active, setActive] = React.useState(null);
      const [draft, setDraft] = React.useState({title:"",body:""});
      const noteColors=["#fff9c4","#e8f5e9","#e3f2fd","#fce4ec","#f3e5f5","#fff3e0"];
      const openNew=()=>{setDraft({title:"",body:"",color:"#fff9c4"});setActive("new");};
      const save=()=>{
        if(!draft.title.trim()&&!draft.body.trim()){setActive(null);return;}
        if(active==="new") setNotes([{id:Date.now(),...draft,time:nowStr()},...notes]);
        else setNotes(notes.map(n=>n.id===active?{...n,...draft,time:nowStr()}:n));
        setActive(null);
      };
      if(active!==null){
        return (
          <div style={{flex:1,display:"flex",flexDirection:"column",background:draft.color||"#fff9c4",height:"100%"}}>
            <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",borderBottom:"1px solid rgba(0,0,0,0.06)"}}>
              <button onClick={save} style={{background:"none",border:"none",cursor:"pointer",fontSize:15,color:GREEN,fontFamily:"inherit",fontWeight:700}}>← 儲存</button>
              <div style={{flex:1,display:"flex",gap:6,justifyContent:"flex-end"}}>
                {noteColors.map(nc=><div key={nc} onClick={()=>setDraft({...draft,color:nc})} style={{width:20,height:20,borderRadius:"50%",background:nc,cursor:"pointer",border:draft.color===nc?"2px solid #555":"2px solid #ddd"}}/>)}
              </div>
            </div>
            <input value={draft.title} onChange={e=>setDraft({...draft,title:e.target.value})} placeholder="標題…"
              style={{border:"none",background:"transparent",padding:"16px 16px 6px",fontSize:18,fontWeight:700,fontFamily:"inherit",color:"#1c1c1c",outline:"none"}}/>
            <textarea value={draft.body} onChange={e=>setDraft({...draft,body:e.target.value})} placeholder="寫下你的想法…"
              style={{flex:1,border:"none",background:"transparent",padding:"6px 16px 16px",fontSize:15,fontFamily:"inherit",color:"#333",outline:"none",resize:"none",lineHeight:1.7}}/>
          </div>
        );
      }
      return (
        <div style={{flex:1,overflowY:"auto",padding:14,background:"#f8f9fa"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <span style={{fontWeight:700,fontSize:17,color:"#1c1c1c"}}>📒 我的記事</span>
            <button onClick={openNew} style={{background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,color:"white",border:"none",borderRadius:20,padding:"7px 16px",fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>+ 新增</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            {notes.map(n=>(
              <div key={n.id} onClick={()=>{setDraft({...n});setActive(n.id);}} style={{background:n.color||"#fff9c4",borderRadius:14,padding:"14px 13px",cursor:"pointer",boxShadow:"0 2px 8px rgba(0,0,0,0.08)",minHeight:90,display:"flex",flexDirection:"column",gap:6,position:"relative"}}>
                <div style={{fontWeight:700,fontSize:14,color:"#1c1c1c"}}>{n.title||"（無標題）"}</div>
                <div style={{fontSize:12.5,color:"#555",lineHeight:1.5,flex:1,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:3,WebkitBoxOrient:"vertical"}}>{n.body}</div>
                <div style={{fontSize:10.5,color:"#aaa"}}>{n.time}</div>
                <button onClick={e=>{e.stopPropagation();setNotes(notes.filter(x=>x.id!==n.id));}} style={{position:"absolute",top:8,right:8,background:"none",border:"none",cursor:"pointer",color:"rgba(0,0,0,0.2)",fontSize:15}}>✕</button>
              </div>
            ))}
          </div>
        </div>
      );
    };

    // ── Reminders Tab ──
    const RemindersTab = () => {
      const [items, setItems] = useStorage("line_reminders",[
        {id:1,text:"喝水 💧",done:false,datetime:""},
      ]);
      const [text,setText]=React.useState("");
      const [dt,setDt]=React.useState("");
      const add=()=>{if(!text.trim())return;setItems([{id:Date.now(),text,done:false,datetime:dt},...items]);setText("");setDt("");};
      const toggle=id=>setItems(items.map(i=>i.id===id?{...i,done:!i.done}:i));
      const remove=id=>setItems(items.filter(i=>i.id!==id));
      const pending=items.filter(i=>!i.done), done=items.filter(i=>i.done);
      return (
        <div style={{flex:1,overflowY:"auto",padding:16,background:"#f8f9fa"}}>
          <div style={{fontWeight:700,fontSize:17,color:"#1c1c1c",marginBottom:14}}>⏰ 提醒事項</div>
          <div style={{background:"white",borderRadius:16,padding:14,marginBottom:16,boxShadow:"0 2px 10px rgba(0,0,0,0.07)"}}>
            <input value={text} onChange={e=>setText(e.target.value)} placeholder="新增提醒…" onKeyDown={e=>e.key==="Enter"&&add()}
              style={{width:"100%",border:"1.5px solid #eee",borderRadius:10,padding:"9px 12px",fontSize:14,fontFamily:"inherit",outline:"none",marginBottom:8}}/>
            <div style={{display:"flex",gap:8}}>
              <input type="datetime-local" value={dt} onChange={e=>setDt(e.target.value)}
                style={{flex:1,border:"1.5px solid #eee",borderRadius:10,padding:"9px 10px",fontSize:13,fontFamily:"inherit",outline:"none",color:"#555"}}/>
              <button onClick={add} style={{background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,color:"white",border:"none",borderRadius:10,padding:"9px 18px",fontSize:14,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>新增</button>
            </div>
          </div>
          {pending.map(item=>(
            <div key={item.id} style={{background:"white",borderRadius:14,padding:"13px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
              <div onClick={()=>toggle(item.id)} style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${GREEN}`,cursor:"pointer",flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14.5,color:"#1c1c1c"}}>{item.text}</div>
                {item.datetime&&<div style={{fontSize:11.5,color:"#aaa",marginTop:2}}>📅 {new Date(item.datetime).toLocaleString("zh-TW")}</div>}
              </div>
              <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:17}}>✕</button>
            </div>
          ))}
          {done.length>0&&<>
            <div style={{fontSize:11,fontWeight:700,color:"#bbb",letterSpacing:1,margin:"12px 0 8px"}}>已完成</div>
            {done.map(item=>(
              <div key={item.id} style={{background:"#f9f9f9",borderRadius:14,padding:"11px 14px",marginBottom:7,display:"flex",alignItems:"center",gap:12,opacity:0.65}}>
                <div onClick={()=>toggle(item.id)} style={{width:22,height:22,borderRadius:"50%",background:GREEN,cursor:"pointer",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",color:"white",fontSize:13}}>✓</div>
                <div style={{flex:1,fontSize:14,color:"#888",textDecoration:"line-through"}}>{item.text}</div>
                <button onClick={()=>remove(item.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#ddd",fontSize:17}}>✕</button>
              </div>
            ))}
          </>}
        </div>
      );
    };

    // ── Main App ──
    const App = () => {
      const [tab, setTab] = React.useState("chat");
      const [liffReady, setLiffReady] = React.useState(false);
      const [userName, setUserName] = React.useState("");
      const [userAvatar, setUserAvatar] = React.useState("");

      React.useEffect(()=>{
        const initLiff = async () => {
          try {
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
              const profile = await liff.getProfile();
              setUserName(profile.displayName);
              setUserAvatar(profile.pictureUrl);
            } else if (!liff.isInClient()) {
              // 瀏覽器環境：可選擇性登入
              // liff.login();
            }
          } catch(e) {
            console.warn("LIFF init failed, running in standalone mode", e);
          } finally {
            setLiffReady(true);
          }
        };
        initLiff();
      },[]);

      if (!liffReady) return (
        <div className="splash">
          <div className="splash-icon">🤖</div>
          <div className="splash-title">小助 私人助理</div>
          <div className="splash-sub">正在啟動…</div>
          <div className="spinner"/>
        </div>
      );

      const tabs=[
        {id:"chat",icon:"💬",label:"聊天"},
        {id:"schedule",icon:"📅",label:"行程"},
        {id:"notes",icon:"📒",label:"記事"},
        {id:"reminders",icon:"⏰",label:"提醒"},
      ];

      return (
        <div style={{width:"100%",height:"100dvh",display:"flex",flexDirection:"column",background:"#efefef",maxWidth:480,margin:"0 auto"}}>
          {/* Header */}
          <div style={{background:`linear-gradient(135deg,${GREEN},${GREEN_DARK})`,padding:"14px 18px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
            {userAvatar
              ? <img src={userAvatar} style={{width:44,height:44,borderRadius:"50%",border:"2px solid rgba(255,255,255,0.5)",flexShrink:0}} alt="avatar"/>
              : <div style={{width:44,height:44,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,border:"2px solid rgba(255,255,255,0.45)",flexShrink:0}}>🤖</div>
            }
            <div style={{flex:1}}>
              <div style={{color:"white",fontWeight:800,fontSize:16,letterSpacing:0.3}}>
                {userName ? `${userName} 的小助` : "小助 · 私人助理"}
              </div>
              <div style={{color:"rgba(255,255,255,0.8)",fontSize:12,display:"flex",alignItems:"center",gap:5,marginTop:1}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:"#b8f5c8",display:"inline-block"}}/>
                全天候待命
              </div>
            </div>
          </div>

          {/* Content */}
          <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            {tab==="chat"&&<ChatTab userName={userName} userAvatar={userAvatar}/>}
            {tab==="schedule"&&<ScheduleTab/>}
            {tab==="notes"&&<NotesTab/>}
            {tab==="reminders"&&<RemindersTab/>}
          </div>

          {/* Bottom Nav */}
          <div style={{background:"white",borderTop:"1px solid #e8e8e8",display:"flex",padding:"6px 0",flexShrink:0,paddingBottom:"env(safe-area-inset-bottom)"}}>
            {tabs.map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"5px 0",fontFamily:"inherit"}}>
                <span style={{fontSize:22,filter:tab===t.id?"none":"grayscale(0.6) opacity(0.55)",transform:tab===t.id?"scale(1.15)":"scale(1)",transition:"all 0.2s",display:"block"}}>{t.icon}</span>
                <span style={{fontSize:10.5,color:tab===t.id?GREEN:"#bbb",fontWeight:tab===t.id?700:400}}>{t.label}</span>
                {tab===t.id&&<div style={{width:4,height:4,borderRadius:"50%",background:GREEN,marginTop:-1}}/>}
              </button>
            ))}
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
